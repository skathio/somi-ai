# CI caller: delegates to skathio/hashira npm-package-ci reusable workflow.
# Runs lint (commitlint non-blocking) + test (validate script) + scan-suite + coverage-report.
# See https://github.com/skathio/hashira/blob/main/docs/flows/npm.md for full adoption guide.

name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Deny-all baseline; the reusable workflow grants minimum per job.
permissions: {}

jobs:
  ci:
    uses: skathio/hashira/.github/workflows/npm-package-ci.yml@v1
    # Per-job grants must mirror the matrix in docs/flows/npm.md §5.
    # Reusable workflows can only narrow the caller's grants, not broaden them.
    permissions:
      contents: read
      pull-requests: write    # commitlint sticky comment + coverage-report PR comment
      security-events: write  # CodeQL when enabled via scan_disable
    with:
      node_version: '20'
      test_command: 'npm test'
      coverage_path: 'coverage/lcov.info'
      # All scans disabled: scan-suite uses nested local `uses:` paths that resolve
      # against the consumer's workspace root, not the .hashira/ checkout path (D14
      # limitation in hashira). Re-enable once hashira fixes nested path resolution.
      scan_disable: 'codeql,actionlint,osv,gitleaks,dependency-review'
      library_ref: 'v1'
