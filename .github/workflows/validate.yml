name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: Validate JSON files
        run: |
          set -euo pipefail
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .copilot-extension/extension.json \
            .copilot-extension/marketplace.json \
            .claude/settings.json \
            package.json \
            examples/sample-consumer/.claude/settings.json; do
            echo "  jq: $f"
            jq empty "$f"
          done

      - name: ShellCheck hook scripts
        run: |
          set -euo pipefail
          find hooks -name '*.sh' -type f -print0 \
            | xargs -0 shellcheck --severity=warning

      - name: Bash syntax check
        run: |
          set -euo pipefail
          find hooks -name '*.sh' -type f -print0 \
            | xargs -0 -I{} bash -n {}

      - name: Validate agent/command/skill frontmatter
        run: |
          set -euo pipefail
          missing=0
          for dir in agents commands skills/*/; do
            find "$dir" -name '*.md' -type f | while read -r f; do
              if ! grep -q '^---' "$f"; then
                echo "MISSING FRONTMATTER: $f"
                missing=1
              fi
            done
          done
          exit $missing
