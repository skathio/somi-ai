# Publish caller: delegates to skathio/hashira npm-package-publish reusable workflow.
# Runs semantic-release inside the `production` Environment gate on every push to main.
# See https://github.com/skathio/hashira/blob/main/docs/flows/npm.md for full adoption guide.
#
# Setup required before first publish:
#   1. Create a GitHub Environment named 'production' with >=1 required reviewer (§7).
#   2. Either configure npm OIDC trusted publishing (recommended, §6) OR set NPM_TOKEN secret.
#   For OIDC: configure the trusted publisher on npmjs.com with workflow filename 'publish.yml'
#   and environment 'production'. The npm-publish job below runs in this file's context so
#   workflow_ref matches.

name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deny-all baseline; jobs grant minimum.
permissions: {}

jobs:
  publish:
    uses: skathio/hashira/.github/workflows/npm-package-publish.yml@v1
    # Per-job grants must mirror the matrix in docs/flows/npm.md §5.
    permissions:
      id-token: write      # OIDC trusted-publishing token exchange
      contents: write      # tag push + CHANGELOG commit by @semantic-release/git
      pull-requests: write # release-note PR comment by @semantic-release/github
      issues: write        # @semantic-release/github creates/closes release issues
    with:
      node_version: '20'
      target: 'https://registry.npmjs.org'
      environment_name: 'production'
      library_ref: 'v1'
    secrets:
      # Omit NPM_TOKEN if OIDC trusted-publishing is configured (recommended).
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish:
    # Runs npm publish via OIDC trusted publishing. Must be a job in THIS file so
    # the OIDC token's workflow_ref = 'publish.yml', matching the npm trusted
    # publisher configuration. The hashira npm-oidc-publish composite action handles
    # the token exchange and publish; no logic lives here.
    needs: publish
    if: ${{ needs.publish.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write  # required to obtain the OIDC JWT for npm trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: skathio/hashira/.github/actions/npm-oidc-publish@v1
        with:
          node_version: '20'
